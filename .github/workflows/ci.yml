# ChopScout CI: verification only. This workflow never publishes, releases,
# uploads build artifacts, or deploys anything. Build output is discarded when
# the runner is destroyed. All actions are pinned to immutable commit SHAs.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
      - name: Install uv
        run: python -m pip install uv==0.11.28
      - name: Sync dependencies
        run: uv sync --frozen --extra dev
      - name: Ruff
        run: uv run --no-sync ruff check .

  metadata:
    name: metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
      - name: Install uv
        run: python -m pip install uv==0.11.28
      - name: Lockfile matches pyproject
        run: uv lock --check
      - name: Package version matches pyproject
        run: |
          uv sync --frozen
          uv run --no-sync python -c "
          import tomllib
          import chopscout
          with open('pyproject.toml', 'rb') as handle:
              declared = tomllib.load(handle)['project']['version']
          assert declared == chopscout.__version__, (declared, chopscout.__version__)
          print(f'version {declared} is consistent')
          "

  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    env:
      QT_QPA_PLATFORM: offscreen
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install FFmpeg and Qt system libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ffmpeg libegl1 libopengl0 libgl1 libxkbcommon0 libdbus-1-3 \
            libfontconfig1 libglib2.0-0 libpulse0
      - name: Install FFmpeg (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y --no-progress
      - name: Install uv
        run: python -m pip install uv==0.11.28
      - name: Sync dependencies
        run: uv sync --frozen --extra dev
      - name: Regenerate the synthetic test fixture
        run: uv run --no-sync python scripts/generate_fixtures.py
      - name: Run test suite
        run: uv run --no-sync pytest

  build-smoke:
    name: build-smoke
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
      - name: Install uv
        run: python -m pip install uv==0.11.28
      - name: Sync dependencies
        run: uv sync --frozen --extra dev
      - name: PyInstaller build smoke test
        run: uv run --no-sync python scripts/build_windows.py
      - name: Verify build output exists
        shell: pwsh
        run: |
          $exe = "dist/ChopScout-MPC/ChopScout-MPC.exe"
          if (-not (Test-Path $exe)) { throw "Expected build output missing: $exe" }
          Get-Item $exe | Format-List Name, Length
      # Deliberately no artifact upload: the temporary build output is
      # discarded when the job's runner is destroyed.
